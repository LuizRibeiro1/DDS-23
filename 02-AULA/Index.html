<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula 2</title>
    <link rel="icon" href="https://i.pinimg.com/236x/7e/f8/e5/7ef8e5a5c9481b40b89835d1710b6b99.jpg" />
  </head>
  <body>

    <h1>TABELA INCRIVEL</h1>


    <table border="5"> 
        <!-- Cabeçalho da tabela -->
        <thead> 
            <tr>
                
                <th>NOME</th>
                <th>ITEM</th>
                <th>QUANTIDADE</th>
                <th>PREÇO</th>                
            </tr>
        </thead>

        <!-- Corpo da tabela  -->
        <tbody> 
            <!-- Crio uma linha -->
            <tr>
                <!-- Crio uma coluna -->
                <td>Cristiano</td>
                <td>Perfume</td>
                <td>7</td>
                <td>R$777.77</td>
                
            </tr>

            <tr>
                 <!-- rowspan = diz quantas linhas ele deve ocupar -->
                <td rowspan="2">macaxeira</td>
                <td>Fruta</td>
                <td>10000000</td>
                <td>O que seu coração mandar</td>
  
                

            </tr>

            <td>Brazino</td>
            <td>Jogo da galera</td>
            <td>777</td>
            <td>R$ 777.777</td>
            
            </tr>
            


        </tbody>
    
        <!-- Rodape da tabela -->
         <tfoot> 
            <tr>
                <!-- Colspan = diz quantas colunas ele deve ocupar -->
                <td colspan="4"> Todos os direitos estao reservados &copy; </td>
            </tr>
         </tfoot>
    </table>
  </body>
</html>
